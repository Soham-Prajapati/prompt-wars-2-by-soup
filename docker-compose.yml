version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLOUD_PROJECT=prompt-wars-2-by-soup
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ALLOW_ORIGINS=*
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # For local dev, a Dockerfile may just run vite, but the existing web Dockerfile builds nginx.
      # For an easier local compose, we can just run node.
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
